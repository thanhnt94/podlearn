{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#0f172a] text-slate-200 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-8">
            <div class="bg-blue-600 p-3 rounded-2xl shadow-lg shadow-blue-500/20">
                <i data-lucide="settings" class="w-8 h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Cấu hình Hệ thống</h1>
                <p class="text-slate-400 mt-1">Quản lý định danh và kết nối hệ sinh thái AuraFlow</p>
            </div>
        </div>

        <!-- Main Card -->
        <div class="bg-[#1e293b] border border-slate-700/50 rounded-3xl shadow-2xl overflow-hidden backdrop-blur-sm">
            <div class="p-8">
                <!-- SSO Toggle Entry -->
                <div class="flex items-center justify-between p-6 bg-[#0f172a]/50 border border-slate-700/30 rounded-2xl mb-8 group transition-all hover:border-blue-500/50">
                    <div class="flex items-start gap-4">
                        <div class="bg-blue-500/10 p-3 rounded-xl group-hover:bg-blue-500/20 transition-colors">
                            <i data-lucide="shield-check" class="w-6 h-6 text-blue-400"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-white">Đăng nhập Tập trung (SSO)</h3>
                            <p class="text-slate-400 text-sm mt-0.5">Sử dụng CentralAuth để hợp nhất tài khoản toàn hệ thống.</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="sso_toggle" class="sr-only peer" 
                               {% if settings.AUTH_PROVIDER == 'central' %}checked{% endif %}>
                        <div class="w-14 h-7 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>

                <!-- SSO Config Panel -->
                <div id="sso_config_panel" class="space-y-6 animate-in fade-in slide-in-from-top-4 duration-500 {% if settings.AUTH_PROVIDER != 'central' %}hidden{% endif %}">
                    <div class="flex items-center gap-2 text-blue-400 font-medium mb-2">
                        <i data-lucide="api" class="w-4 h-4"></i>
                        <span class="uppercase tracking-wider text-xs">Cấu hình CentralAuth V2</span>
                    </div>

                    <div class="grid gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-300 ml-1">Địa chỉ máy chủ CentralAuth</label>
                            <div class="relative">
                                <i data-lucide="link" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                                <input type="url" id="ca_server_url" 
                                       class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600"
                                       placeholder="Ví dụ: http://127.0.0.1:5001" 
                                       value="{{ settings.CENTRAL_AUTH_SERVER_ADDRESS }}">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300 ml-1">Client ID</label>
                                <input type="text" id="ca_client_id" 
                                       class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
                                       value="{{ settings.CENTRAL_AUTH_CLIENT_ID }}">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300 ml-1">Client Secret</label>
                                <div class="relative">
                                    <input type="password" id="ca_client_secret" 
                                           class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-3 px-4 pr-12 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
                                           value="{{ settings.CENTRAL_AUTH_CLIENT_SECRET }}">
                                    <button type="button" onclick="toggleSecret()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                                        <i data-lucide="eye" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button id="btn_test" onclick="testConnection()"
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                        <i data-lucide="zap" class="w-5 h-5"></i>
                        Kiểm tra kết nối & Lưu cấu hình
                    </button>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="px-8 py-6 bg-slate-800/50 border-t border-slate-700/50 flex justify-center">
                <a href="{{ url_for('admin.dashboard') }}" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-medium">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Quay lại Dashboard Overview
                </a>
            </div>
        </div>
    </div>
</div>

<script>
// Initialize Lucide icons
lucide.createIcons();

function toggleSecret() {
    const input = document.getElementById('ca_client_secret');
    input.type = input.type === 'password' ? 'text' : 'password';
}

document.getElementById('sso_toggle').addEventListener('change', function(e) {
    const enabled = e.target.checked;
    const panel = document.getElementById('sso_config_panel');
    
    // UI feedback: show/hide panel immediately for better UX
    if (enabled) {
        panel.classList.remove('hidden');
    } else {
        panel.classList.add('hidden');
    }
    
    fetch('{{ url_for("admin.toggle_sso") }}', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'X-CSRF-Token': getCsrfToken()
        },
        body: JSON.stringify({ enabled: enabled })
    })
    .then(res => {
        if (!res.ok) throw new Error('Status: ' + res.status);
        return res.json();
    })
    .then(data => {
        if (!data.success) {
            alert('Lỗi: ' + data.message);
            location.reload(); // Revert on failure
        }
    })
    .catch(err => {
        console.error('SSO Toggle Error:', err);
        alert('Lỗi khi lưu trạng thái. Vui lòng thử lại.');
        location.reload();
    });
});

function testConnection() {
    const btn = document.getElementById('btn_test');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full mr-2"></span>Đang kết nối...';

    const payload = {
        base_url: document.getElementById('ca_server_url').value,
        client_id: document.getElementById('ca_client_id').value,
        client_secret: document.getElementById('ca_client_secret').value
    };

    fetch('{{ url_for("admin.test_auth_connection") }}', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'X-CSRF-Token': getCsrfToken()
        },
        body: JSON.stringify(payload)
    })
    .then(res => {
        if (!res.ok) throw new Error('Status: ' + res.status);
        return res.json();
    })
    .then(data => {
        btn.disabled = false;
        btn.innerHTML = originalContent;
        if (data.success) {
            alert('✅ ' + data.message);
            location.reload();
        } else {
            alert('❌ Lỗi: ' + data.message);
        }
    })
    .catch(err => {
        btn.disabled = false;
        btn.innerHTML = originalContent;
        console.error('SSO Test Error:', err);
        alert('❌ Lỗi kết nối máy chủ hoặc xác thực thất bại.');
    });
}
</script>
{% endblock %}
