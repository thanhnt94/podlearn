<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AuraFlow - Luyện Phản Xạ & Shadowing{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="description" content="{% block meta_desc %}AuraFlow - Nền tảng luyện phản xạ Shadowing đa ngôn ngữ bằng AI. Chuyển hóa kiến thức thành bản năng giao tiếp.{% endblock %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
    <script>
        // CSRF Token Helper for AJAX - Move to top so early scripts can use it
        function getCsrfToken() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.getAttribute('content') : '';
        }
    </script>
</head>
<body class="{% block body_class %}{% endblock %}">


    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container" id="flashContainer">
            {% for category, message in messages %}
            <div class="flash flash--{{ category }}">
                <span>{{ message }}</span>
                <button class="flash__close" onclick="this.parentElement.remove()">&times;</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}

    <script>
        // Auto-dismiss flash messages after 5s
        document.querySelectorAll('.flash').forEach(el => {
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 5000);

        });
    </script>


</body>
</html>
