<!-- Modal: Edit Sentence (Shadow Editor) -->
<div id="edit-modal" class="hidden fixed inset-0 z-[3000] items-center justify-center p-6 bg-black/80 backdrop-blur-sm animate-in fade-in duration-300">
    <div class="relative w-full max-w-5xl bg-[#111827] border border-white/10 rounded-[32px] shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
        <!-- Modal Header & Tabs -->
        <div class="p-8 border-b border-white/5 bg-white/5 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h3 class="text-xl font-bold"><span id="editor-action-text">Chỉnh sửa</span> <span id="editor-track-text">Ngữ pháp</span> <span class="text-[#6c5ce7]">AuraFlow</span></h3>
                <p class="text-[10px] uppercase tracking-widest text-[#5a6478] font-bold mt-1">Shadow Editor v2.5 (Unified)</p>
            </div>
            
            <div class="flex items-center bg-black/40 p-1 rounded-2xl border border-white/5">
                <button onclick="switchEditTab('form')" id="tab-btn-form" class="px-6 py-2 rounded-xl text-xs font-bold transition-all bg-[#6c5ce7] text-white">BIỂU MẪU</button>
                <button onclick="switchEditTab('json')" id="tab-btn-json" class="px-6 py-2 rounded-xl text-xs font-bold transition-all text-[#8892a8] hover:text-white">JSON (NÂNG CAO)</button>
            </div>

            <button onclick="toggleEditModal(false)" class="p-2 text-[#8892a8] hover:bg-white/5 rounded-full transition-all">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Modal Content (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-10 space-y-12" id="edit-content-form">
            <!-- 1. Track Specific Fields -->
            <div id="fields-grammar" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-rose-400">Ngữ pháp (Pattern)</label>
                    <input type="text" id="g-pattern" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-rose-500/50 transition-all font-bold text-lg">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-rose-400">Ý nghĩa chính</label>
                    <input type="text" id="g-meaning" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-rose-500/50 transition-all font-medium">
                </div>
                <!-- Formation Manager -->
                <div class="space-y-6 md:col-span-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478] flex items-center gap-2">
                             <i data-lucide="layers" class="w-3 h-3"></i> Cấu trúc chia (Formation)
                        </label>
                        <button onclick="addFormationRow()" class="text-[10px] font-bold text-[#6c5ce7] hover:text-[#a78bfa] transition-all flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm cấu trúc
                        </button>
                    </div>
                    <div id="formation-rows-container" class="space-y-3"></div>
                </div>
                <!-- Signal Words Manager -->
                <div class="space-y-6 pt-6 border-t border-white/5 md:col-span-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black uppercase tracking-widest text-teal-400 flex items-center gap-2">
                             <i data-lucide="search" class="w-3 h-3"></i> Dấu hiệu nhận biết (Signal Words)
                        </label>
                        <button onclick="addSignalRow()" class="text-[10px] font-bold text-teal-400 hover:text-teal-300 transition-all flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm dấu hiệu
                        </button>
                    </div>
                    <div id="signal-rows-container" class="space-y-3"></div>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Cấp độ JLPT</label>
                    <input type="text" id="g-level" placeholder="N2" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-rose-500/50 transition-all text-sm">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Sắc thái bổ sung</label>
                    <textarea id="g-nuance" rows="2" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-rose-500/50 transition-all text-sm"></textarea>
                </div>
                <!-- Notes Manager -->
                <div class="space-y-6 pt-6 border-t border-white/5 md:col-span-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black uppercase tracking-widest text-red-400 flex items-center gap-2">
                             <i data-lucide="alert-triangle" class="w-3 h-3"></i> Lưu ý quan trọng (Notes)
                        </label>
                        <button onclick="addNoteRow()" class="text-[10px] font-bold text-red-400 hover:text-red-300 transition-all flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm lưu ý
                        </button>
                    </div>
                    <div id="note-rows-container" class="space-y-3"></div>
                </div>

                <!-- Comparison Manager -->
                <div class="space-y-6 pt-6 border-t border-white/5 md:col-span-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black uppercase tracking-widest text-blue-400 flex items-center gap-2">
                             <i data-lucide="repeat" class="w-3 h-3"></i> Phân biệt & So sánh (Comparisons)
                        </label>
                        <button onclick="addComparisonRow()" class="text-[10px] font-bold text-blue-400 hover:text-blue-300 transition-all flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm so sánh
                        </button>
                    </div>
                    <div id="comparison-rows-container" class="space-y-3"></div>
                </div>
                <!-- Multiple Examples Manager -->
                <div class="space-y-6 pt-6 border-t border-white/5 md:col-span-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black uppercase tracking-widest text-rose-400/80 flex items-center gap-2">
                             <i data-lucide="languages" class="w-3 h-3"></i> Danh sách Ví dụ (Examples)
                        </label>
                        <button onclick="addExampleRow()" class="text-[10px] font-bold text-rose-400 hover:text-rose-300 transition-all flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm ví dụ
                        </button>
                    </div>
                    <div id="example-rows-container" class="space-y-4"></div>
                </div>
            </div>

            <div id="fields-vocab" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-teal-400">Từ vựng (Word)</label>
                    <input type="text" id="v-word" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all font-bold text-lg">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-teal-400">Cách đọc (Reading)</label>
                    <input type="text" id="v-reading" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all font-medium">
                </div>
                <div class="space-y-4 md:col-span-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-teal-400">Nghĩa tiếng Việt</label>
                    <input type="text" id="v-meaning" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all font-medium">
                </div>
                <div class="space-y-4 md:col-span-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Chiết tự Kanji (Breakdown)</label>
                    <textarea id="v-kanji" rows="2" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all text-sm"></textarea>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Câu chuyện ghi nhớ (Mnemonic)</label>
                    <textarea id="v-mnemonic" rows="3" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all text-sm italic"></textarea>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Collocations (Đi kèm)</label>
                    <textarea id="v-collocations" rows="3" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all text-sm"></textarea>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478]">Cấp độ</label>
                    <input type="text" id="v-level" placeholder="N2" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-teal-500/50 transition-all text-sm">
                </div>
            </div>

            <div id="fields-sentence" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Câu gốc (Original)</label>
                    <input type="text" id="s-original" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-indigo-500/50 transition-all font-medium">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Bản dịch (Translation)</label>
                    <input type="text" id="s-translation" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-indigo-500/50 transition-all font-medium">
                </div>
            </div>

            <!-- 2. Token Manager (Common) -->
            <div class="space-y-6 pt-6 border-t border-white/5">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#5a6478] flex items-center gap-2">
                        <i data-lucide="split" class="w-3 h-3"></i> Phân tích chi tiết (Tokens)
                    </label>
                    <div class="flex items-center gap-3">
                        <button onclick="quickScanExamples()" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 transition-all flex items-center gap-2 uppercase tracking-widest bg-indigo-400/5 px-3 py-1 rounded-lg border border-indigo-400/10">
                            <i data-lucide="zap" class="w-3 h-3"></i> Quét từ vựng từ ví dụ
                        </button>
                        <button onclick="addTokenRow()" class="text-[10px] font-bold text-[#6c5ce7] hover:text-[#a78bfa] transition-all flex items-center gap-2 uppercase tracking-widest px-3 py-1 bg-white/5 rounded-lg">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm từ vựng
                        </button>
                    </div>
                </div>
                <div id="token-rows-container" class="space-y-3"></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-10 hidden" id="edit-content-json">
            <div class="bg-[#0a0e1a] rounded-3xl p-6 border border-white/5 h-full">
                <textarea id="edit-json-input" class="w-full h-[400px] bg-transparent text-[#a78bfa] text-xs font-mono leading-relaxed focus:outline-none resize-none"></textarea>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="p-8 border-t border-white/5 bg-white/5 flex justify-end gap-4">
            <button onclick="toggleEditModal(false)" class="px-8 py-3 rounded-2xl font-bold text-[#8892a8] hover:bg-white/5 transition-all">Hủy bỏ</button>
            <button id="btn-save-edit" class="px-10 py-3 bg-[#6c5ce7] text-white rounded-2xl font-bold hover:shadow-[0_0_30px_rgba(108,92,231,0.3)] transition-all flex items-center gap-2">
                <i data-lucide="check" class="w-5 h-5"></i>
                Lưu thay đổi
            </button>
        </div>
    </div>
</div>

<script>
    // These variables must be provided by the parent template
    // const setId = ...;
    // let currentEditId = ...;
    // let editorMode = 'edit';
    // let currentEditData = ...;
    // let activeEditTab = 'form';
    // const trackMode = ...;

    window.toggleEditModal = function(show) {
        const modal = document.getElementById('edit-modal');
        if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        else { modal.classList.add('hidden'); modal.classList.remove('flex'); }
    };

    window.switchEditTab = function(tab) {
        activeEditTab = tab;
        const formBtn = document.getElementById('tab-btn-form');
        const jsonBtn = document.getElementById('tab-btn-json');
        const formContent = document.getElementById('edit-content-form');
        const jsonContent = document.getElementById('edit-content-json');

        if (tab === 'form') {
            const rawJson = document.getElementById('edit-json-input').value;
            try {
                currentEditData = JSON.parse(rawJson);
                syncJsonToForm();
                formBtn.classList.add('bg-[#6c5ce7]', 'text-white');
                formBtn.classList.remove('text-[#8892a8]');
                jsonBtn.classList.remove('bg-[#6c5ce7]', 'text-white');
                jsonBtn.classList.add('text-[#8892a8]');
                formContent.classList.remove('hidden');
                jsonContent.classList.add('hidden');
            } catch (e) {
                alert("Dữ liệu JSON không hợp lệ.");
                activeEditTab = 'json';
            }
        } else {
            syncFormToJson();
            jsonBtn.classList.add('bg-[#6c5ce7]', 'text-white');
            jsonBtn.classList.remove('text-[#8892a8]');
            formBtn.classList.remove('bg-[#6c5ce7]', 'text-white');
            formBtn.classList.add('text-[#8892a8]');
            jsonContent.classList.remove('hidden');
            formContent.classList.add('hidden');
        }
    };

    function syncJsonToForm() {
        // Universal Fields
        const core = currentEditData.core_sentence || {};
        document.getElementById('s-original').value = core.original_text || "";
        document.getElementById('s-translation').value = core.translated_text || "";

        // Track-specific
        if (trackMode === 'mastery_grammar') {
            document.getElementById('g-pattern').value = currentEditData.pattern || "";
            document.getElementById('g-meaning').value = currentEditData.meaning || "";
            document.getElementById('g-nuance').value = currentEditData.nuance || "";
            document.getElementById('g-level').value = currentEditData.jlpt_level || "";

            // Handle formation conversion from JSON array/legacy string
            const formationContainer = document.getElementById('formation-rows-container');
            formationContainer.innerHTML = "";
            let formations = currentEditData.formation || [];
            if (typeof formations === 'string' && formations.trim()) {
                formations = formations.split('\n').filter(l => l.trim());
            }
            if (!Array.isArray(formations)) formations = [];
            formations.forEach(f => addFormationRow(f, true));
            
            // Handle notes conversion from JSON
            const notesContainer = document.getElementById('note-rows-container');
            notesContainer.innerHTML = "";
            let notes = currentEditData.points_to_note || [];
            if (typeof notes === 'string' && notes.trim()) {
                notes = [notes];
            }
            if (!Array.isArray(notes)) notes = [];
            notes.forEach(n => addNoteRow(n, true));

            // Handle comparisons conversion from JSON
            const comparisonsContainer = document.getElementById('comparison-rows-container');
            comparisonsContainer.innerHTML = "";
            let comparisons = currentEditData.similar_patterns || [];
            if (typeof comparisons === 'string' && comparisons.trim()) {
                comparisons = [{ pattern: comparisons, difference: "" }];
            }
            if (!Array.isArray(comparisons)) comparisons = [];
            comparisons.forEach(c => addComparisonRow(c, true));
            
            // Handle signal words conversion from JSON
            const signalsContainer = document.getElementById('signal-rows-container');
            signalsContainer.innerHTML = "";
            let signals = currentEditData.signal_words || [];
            if (typeof signals === 'string' && signals.trim()) {
                signals = [{ word: signals, meaning: "" }];
            }
            if (!Array.isArray(signals)) signals = [];
            signals.forEach(s => addSignalRow(s, true));

            // Handle labels alias for tokens
            if (!currentEditData.color_mapped_tokens && (currentEditData.vocabulary || currentEditData.tokens)) {
                currentEditData.color_mapped_tokens = currentEditData.vocabulary || currentEditData.tokens;
            }

            // Handle examples: Switch to japanese/vietnamese keys
            const examplesContainer = document.getElementById('example-rows-container');
            examplesContainer.innerHTML = "";
            let examples = currentEditData.examples || [];
            if (!Array.isArray(examples)) examples = [];
            
            // Backward compatibility for old JSON format
            examples.forEach(ex => {
                if (ex.text && !ex.japanese) ex.japanese = ex.text;
                if (ex.translation && !ex.vietnamese) ex.vietnamese = ex.translation;
                addExampleRow(ex, true);
            });
        } else if (trackMode === 'mastery_vocab') {
            document.getElementById('v-word').value = currentEditData.word || "";
            document.getElementById('v-reading').value = currentEditData.reading || "";
            document.getElementById('v-meaning').value = currentEditData.meaning || "";
            document.getElementById('v-kanji').value = currentEditData.kanji_breakdown || "";
            document.getElementById('v-mnemonic').value = currentEditData.mnemonic || "";
            document.getElementById('v-collocations').value = currentEditData.collocations || "";
            document.getElementById('v-level').value = currentEditData.jlpt_level || "";
        }

        const container = document.getElementById('token-rows-container');
        container.innerHTML = "";
        let tokens = currentEditData.color_mapped_tokens || currentEditData.tokens || [];
        if (!Array.isArray(tokens)) tokens = [];
        tokens.forEach(t => addTokenRow(t, true));
        lucide.createIcons();
    }

    window.addTokenRow = function(data = null, skipIcon = false) {
        const container = document.getElementById('token-rows-container');
        const row = document.createElement('div');
        row.className = "token-row grid grid-cols-12 gap-2 p-3 rounded-xl bg-white/5 border border-white/5 items-center group";
        row.innerHTML = `
            <div class="col-span-2"><input type="text" placeholder="Từ" class="t-source w-full bg-black/20 border border-white/5 rounded-lg p-2 text-xs" value="${data?.source_word || ''}"></div>
            <div class="col-span-2"><input type="text" placeholder="Cách đọc" class="t-reading w-full bg-black/20 border border-white/5 rounded-lg p-2 text-xs" value="${data?.reading || ''}"></div>
            <div class="col-span-2"><input type="text" placeholder="Hán Việt" class="t-han-viet w-full bg-black/20 border border-white/5 rounded-lg p-2 text-xs text-red-300/80" value="${data?.han_viet || ''}"></div>
            <div class="col-span-3"><input type="text" placeholder="Nghĩa" class="t-target w-full bg-black/20 border border-white/5 rounded-lg p-2 text-xs" value="${data?.target_word || ''}"></div>
            <div class="col-span-2">
                <select class="t-color w-full bg-black/20 border border-white/5 rounded-lg p-2 text-[10px]">
                    <option value="none" ${!data || data.color_group === 'none' ? 'selected' : ''}>Trắng</option>
                    ${[1,2,3,4,5,6,7].map(n => `<option value="${n}" ${data?.color_group == n ? 'selected' : ''}>Màu ${n}</option>`).join('')}
                </select>
            </div>
            <div class="col-span-1 text-right">
                <button type="button" onclick="this.closest('.token-row').remove()" class="p-1 text-[#5a6478] hover:text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
            </div>
        `;
        container.appendChild(row);
        if (!skipIcon) lucide.createIcons();
    };

    window.addExampleRow = function(data = null, skipIcon = false) {
        const container = document.getElementById('example-rows-container');
        const row = document.createElement('div');
        row.className = "example-row flex flex-col gap-3 p-4 rounded-2xl bg-white/5 border border-white/5 group relative";
        
        const vocaId = 'voca-container-' + Math.random().toString(36).substr(2, 9);
        
        row.innerHTML = `
            <div class="grid grid-cols-12 gap-3 items-center">
                <div class="col-span-11 grid grid-cols-2 gap-3">
                    <textarea placeholder="Ví dụ (Japanese)" class="ex-jp w-full bg-black/20 border border-white/5 rounded-lg p-2 text-sm h-12">${data?.japanese || ''}</textarea>
                    <textarea placeholder="Bản dịch (Vietnamese)" class="ex-vn w-full bg-black/20 border border-white/5 rounded-lg p-2 text-sm h-12">${data?.vietnamese || ''}</textarea>
                </div>
                <div class="col-span-1 text-right">
                    <button onclick="this.closest('.example-row').remove()" class="p-2 text-[#5a6478] hover:text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
            
            <div class="mt-2 pl-4 border-l-2 border-white/5">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-[10px] font-bold text-[#5a6478] uppercase tracking-widest">Từ vựng thành phần (Example Vocabulary)</div>
                    <button type="button" onclick="addExVocaRow('${vocaId}')" class="text-[10px] text-indigo-400 hover:text-indigo-300 font-bold flex items-center gap-1 uppercase">
                        <i data-lucide="plus" class="w-2 h-2"></i> Thêm từ ví dụ
                    </button>
                </div>
                <div id="${vocaId}" class="ex-voca-container space-y-2"></div>
            </div>
        `;
        container.appendChild(row);
        
        // Initial load of example vocab
        const vocaContainer = document.getElementById(vocaId);
        (data?.vocabulary || []).forEach(v => addExVocaRow(vocaId, v, true));
        
        if (!skipIcon) lucide.createIcons();
    };

    window.addExVocaRow = function(containerId, data = null, skipIcon = false) {
        const container = document.getElementById(containerId);
        const row = document.createElement('div');
        row.className = "ex-voca-row grid grid-cols-12 gap-2 items-center group/voca";
        row.innerHTML = `
            <div class="col-span-3"><input type="text" placeholder="Từ" class="ev-word w-full bg-black/40 border border-white/5 rounded-lg p-1.5 text-[10px] h-7 text-white" value="${data?.word || data?.source_word || ''}"></div>
            <div class="col-span-2"><input type="text" placeholder="Đọc" class="ev-reading w-full bg-black/40 border border-white/5 rounded-lg p-1.5 text-[10px] h-7 text-white/70" value="${data?.reading || ''}"></div>
            <div class="col-span-3"><input type="text" placeholder="Hán Việt" class="ev-han-viet w-full bg-black/40 border border-white/5 rounded-lg p-1.5 text-[10px] h-7 text-red-300/80" value="${data?.han_viet || ''}"></div>
            <div class="col-span-3"><input type="text" placeholder="Nghĩa" class="ev-meaning w-full bg-black/40 border border-white/5 rounded-lg p-1.5 text-[10px] h-7 text-indigo-300/80" value="${data?.meaning || data?.target_word || ''}"></div>
            <div class="col-span-1 text-right">
                <button type="button" onclick="this.closest('.ex-voca-row').remove()" class="p-1 text-[#5a6478] hover:text-red-400 opacity-0 group-hover/voca:opacity-100"><i data-lucide="x" class="w-3 h-3"></i></button>
            </div>
        `;
        container.appendChild(row);
        if (!skipIcon) lucide.createIcons();
    };

    window.addSignalRow = function(data = null, skipIcon = false) {
        const container = document.getElementById('signal-rows-container');
        const row = document.createElement('div');
        row.className = "signal-row grid grid-cols-12 gap-3 p-4 rounded-2xl bg-white/5 border border-white/5 items-center group";

            <div class="col-span-6"><input type="text" placeholder="Dấu hiệu (e.g. きっと)" class="s-word w-full bg-black/20 border border-white/5 rounded-lg p-2 text-sm" value="${data?.word || ''}"></div>
            <div class="col-span-5"><input type="text" placeholder="Ý nghĩa (e.g. chắc chắn)" class="s-meaning w-full bg-black/20 border border-white/5 rounded-lg p-2 text-sm" value="${data?.meaning || ''}"></div>
            <div class="col-span-1 text-right">
                <button onclick="this.closest('.signal-row').remove()" class="p-2 text-[#5a6478] hover:text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        `;
        container.appendChild(row);
        if (!skipIcon) lucide.createIcons();
    };

            <div class="col-span-1 text-right">

    window.addFormationRow = function(data = null, skipIcon = false) {

            <div class="col-span-11"><input type="text" placeholder="Cấu trúc (e.g. Vる + [hl]わけ에는...[/hl])" class="f-text w-full bg-black/20 border border-white/5 rounded-lg p-3 text-sm font-bold" value="${data || ''}"></div>
            <div class="col-span-1 text-right">
                <button onclick="this.closest('.formation-row').remove()" class="p-2 text-[#5a6478] hover:text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>

    window.quickScanExamples = function() {
        const words = new Set();
        // Collect existing tokens to avoid duplicates
        document.querySelectorAll('.t-source').forEach(inp => { if(inp.value.trim()) words.add(inp.value.trim()); });

        let addedCount = 0;
        // Scan Examples for [hl] and [b]
        document.querySelectorAll('.ex-jp').forEach(area => {
            const text = area.value;
            const matches = text.match(/\[(hl|b)\](.*?)\[\/(hl|b)\]/g) || [];
            matches.forEach(m => {
                const word = m.replace(/\[(hl|b)\](.*?)\[\/(hl|b)\]/, '$2');
                if (word && !words.has(word)) {
                    addTokenRow({ source_word: word }, true);
                    words.add(word);
                    addedCount++;
                }
            });
        });

        if (addedCount > 0) {
            lucide.createIcons();
            alert(`Đã trích xuất ${addedCount} từ vựng mới từ ví dụ vào phân tích chi tiết!`);
        } else {
            alert("Không tìm thấy từ vựng mới nào trong thẻ [hl] hoặc [b]. Hãy bọc từ vựng vào [hl]...[/hl] để quét nhanh.");
        }
    };

    function syncFormToJson() {
        const tokens = [];
        document.querySelectorAll('.token-row').forEach(row => {
            tokens.push({
                source_word: row.querySelector('.t-source').value,
                reading: row.querySelector('.t-reading').value,
                han_viet: row.querySelector('.t-han-viet').value,
                target_word: row.querySelector('.t-target').value,
                color_group: row.querySelector('.t-color').value
            });
        });

        const newData = { ...currentEditData, color_mapped_tokens: tokens };

        if (trackMode === 'mastery_grammar') {
            const examples = [];
            document.querySelectorAll('.example-row').forEach(row => {
                const jp = row.querySelector('.ex-jp').value;
                const vn = row.querySelector('.ex-vn').value;
                
                const vocab = [];
                row.querySelectorAll('.ex-voca-row').forEach(vr => {
                    vocab.push({
                        word: vr.querySelector('.ev-word').value,
                        reading: vr.querySelector('.ev-reading').value,
                        han_viet: vr.querySelector('.ev-han-viet').value,
                        meaning: vr.querySelector('.ev-meaning').value
                    });
                });

                if (jp || vn) {
                    examples.push({ japanese: jp, vietnamese: vn, vocabulary: vocab });
                }
            });
            newData.examples = examples;

            const signals = [];
            document.querySelectorAll('.signal-row').forEach(row => {
                const w = row.querySelector('.s-word').value;
                const m = row.querySelector('.s-meaning').value;
                if (w || m) {
                    signals.push({ word: w, meaning: m });
                }
            });
            newData.signal_words = signals;

            const notes = [];
            document.querySelectorAll('.note-row').forEach(row => {
                const nt = row.querySelector('.n-text').value;
                if (nt.trim()) notes.push(nt.trim());
            });
            newData.points_to_note = notes;

            const comparisons = [];
            document.querySelectorAll('.comparison-row').forEach(row => {
                const pt = row.querySelector('.c-pattern').value;
                const df = row.querySelector('.c-diff').value;
                if (pt.trim() || df.trim()) comparisons.push({ pattern: pt.trim(), difference: df.trim() });
            });
            newData.similar_patterns = comparisons;

            const formations = [];
            document.querySelectorAll('.formation-row').forEach(row => {
                const f = row.querySelector('.f-text').value;
                if (f.trim()) formations.push(f.trim());
            });
            newData.formation = formations;

            newData.pattern = document.getElementById('g-pattern').value;
            newData.meaning = document.getElementById('g-meaning').value;
            newData.nuance = document.getElementById('g-nuance').value;
            newData.jlpt_level = document.getElementById('g-level').value;
        } else if (trackMode === 'mastery_vocab') {
            newData.word = document.getElementById('v-word').value;
            newData.reading = document.getElementById('v-reading').value;
            newData.meaning = document.getElementById('v-meaning').value;
            newData.kanji_breakdown = document.getElementById('v-kanji').value;
            newData.mnemonic = document.getElementById('v-mnemonic').value;
            newData.collocations = document.getElementById('v-collocations').value;
            newData.jlpt_level = document.getElementById('v-level').value;
        } else {
            newData.core_sentence = {
                original_text: document.getElementById('s-original').value,
                translated_text: document.getElementById('s-translation').value
            };
        }

        currentEditData = newData;
        document.getElementById('edit-json-input').value = JSON.stringify(currentEditData, null, 2);
    }

    document.getElementById('btn-save-edit').addEventListener('click', async () => {
        if (activeEditTab === 'form') syncFormToJson();
        else {
            try { currentEditData = JSON.parse(document.getElementById('edit-json-input').value); }
            catch (e) { return alert("JSON không hợp lệ."); }
        }

        const url = editorMode === 'add' ? '/api/sentences' : `/api/sentences/${currentEditId}`;
        const method = editorMode === 'add' ? 'POST' : 'PATCH';

        try {
            const payload = { detailed_analysis: currentEditData, set_id: setId };
            if (editorMode === 'edit') {
                payload.original_text = currentEditData.core_sentence?.original_text || currentEditData.pattern || currentEditData.word;
                payload.translated_text = currentEditData.core_sentence?.translated_text || currentEditData.meaning;
            }

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': "{{ csrf_token() }}" },
                body: JSON.stringify(payload)
            });
            const resData = await response.json();
            if (resData.success) {
                if (editorMode === 'add' && resData.sentence_id) {
                    location.href = location.pathname.substring(0, location.pathname.lastIndexOf('/')) + '/' + resData.sentence_id;
                } else {
                    location.reload();
                }
            } else {
                alert("Lỗi: " + resData.error);
            }
        } catch (e) { alert("Lỗi khi lưu."); }
    });

    window.openEditor = function(arg1, arg2 = null, arg3 = null) {
        let mode, id, analysisPayload;
        
        if (typeof arg1 === 'string') {
            // Original 'add' mode: openEditor('add')
            mode = arg1;
            id = arg2;
            analysisPayload = arg3;
        } else {
            // New 'edit' mode: openEditor(this, 'edit', id)
            mode = arg2;
            id = arg3;
            try {
                analysisPayload = JSON.parse(arg1.getAttribute('data-analysis') || '{}');
            } catch (e) {
                console.error("JSON Parse Error in openEditor:", e);
                analysisPayload = {};
            }
        }

        editorMode = mode;
        currentEditId = id;

        document.getElementById('editor-action-text').innerText = mode === 'add' ? 'Thêm mới' : 'Chỉnh sửa';
        const trackTitleMap = {
            'mastery_grammar': 'Ngữ pháp',
            'mastery_vocab': 'Từ vựng',
            'mastery_sentence': 'Mẫu câu'
        };
        document.getElementById('editor-track-text').innerText = trackTitleMap[trackMode] || 'Bản ghi';

        document.getElementById('fields-grammar').classList.toggle('hidden', trackMode !== 'mastery_grammar');
        document.getElementById('fields-vocab').classList.toggle('hidden', trackMode !== 'mastery_vocab');
        document.getElementById('fields-sentence').classList.toggle('hidden', !['mastery_sentence', 'sentence'].includes(trackMode));

        if (mode === 'add') {
            currentEditData = {
                core_sentence: { original_text: "", translated_text: "" },
                color_mapped_tokens: [],
                usage_context: { nuance: "" }
            };
            if (trackMode === 'mastery_grammar') {
                Object.assign(currentEditData, {
                    pattern: "", meaning: "", formation: [], signal_words: [],
                    canonical_example: "", nuance: "", points_to_note: [], similar_patterns: [], jlpt_level: ""
                });
            } else if (trackMode === 'mastery_vocab') {
                Object.assign(currentEditData, {
                    word: "", reading: "", meaning: "", kanji_breakdown: "", mnemonic: "", collocations: "", jlpt_level: ""
                });
            }
        } else {
            currentEditData = JSON.parse(JSON.stringify(analysisPayload || {}));
        }

        document.getElementById('edit-json-input').value = JSON.stringify(currentEditData, null, 2);
        syncJsonToForm();
        switchEditTab('form');
        toggleEditModal(true);
    };
</script>
