<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/img/logo_premium.png">
    <title>PodLearn Admin Studio</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Pass backend data to React -->
    <script>
        window.__PODLEARN_ADMIN_DATA__ = {
            user_id: {{ current_user.id }},
            username: "{{ current_user.username }}",
            csrf_token: "{{ csrf_token() }}",
            is_admin: {{ 'true' if current_user.is_admin else 'false' }},
            role: "{{ current_user.role }}",
            api_base: "/api/admin"
        };
    </script>

    <!-- Vite Assets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='admin-dist/assets/index.css') }}">
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="module" src="{{ url_for('static', filename='admin-dist/assets/index.js') }}"></script>
</body>
</html>
