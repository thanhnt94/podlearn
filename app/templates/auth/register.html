{% extends "base.html" %}
{% block title %}Register — AuraFlow{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-logo" style="display:flex; justify-content:center; align-items:center; gap:10px; font-weight:700; margin-bottom:10px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span style="letter-spacing: -0.5px;">Aura<span style="color:var(--accent);">Flow</span></span>
            </h1>
            <p class="auth-subtitle">AuraFlow - Luyện Phản Xạ & Shadowing</p>
        </div>

        <form method="POST" class="auth-form" id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" 
                       value="{{ username | default('') }}" 
                       placeholder="Choose a username" required autofocus
                       minlength="3">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" 
                       value="{{ email | default('') }}" 
                       placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                       placeholder="At least 6 characters" required
                       minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       placeholder="Repeat your password" required>
            </div>

            <button type="submit" class="btn btn--primary btn--full" id="registerBtn">
                Create Account
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? 
            <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
